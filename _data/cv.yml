# ── Research Summary ───────────────────────────────────────
research_summary:
  - affiliation: "University of California, Berkeley, EECS"
    period: "2025.09–present"
    bullets:
      - >-
        Research focuses on the co-design of board-level power electronics
        and on-interposer high-voltage integrated voltage regulators
        (HV-IVR, >6 V input) for next-generation GPU/CPU power delivery,
        leveraging hybrid switched-capacitor/inductor converter topologies
        and scalable distributed converter arrays to achieve high aggregate
        current, high current density, and high power density.

  - affiliation: "University of Macau, State Key Laboratory of Analog and Mixed-Signal VLSI"
    period: "2018.08–2025.09"
    bullets:
      - >-
        Designed and taped out multiple hybrid SC/inductor DC-DC converters
        in 65 nm CMOS and 180 nm BCD processes, covering the full IC design
        cycle from topology innovation, circuit/layout implementation, to
        silicon measurement.
      - >-
        Demonstrated state-of-the-art efficiency (96.1% at 4-to-1.2 V),
        current density (1.46 A/mm2 at 12:1), and transient response
        (63 mV droop @ 3.5 A load step) across hybrid converters with
        conversion ratios from 4:1 to 12:1.
      - >-
        Pioneered a scalable multi-module parallel architecture with
        one-pin decentralized current balancing, reducing interconnect
        complexity from O(N) to O(1) — directly applicable to IVR arrays
        and vertical power delivery.
      - >-
        25 publications: 1 ISSCC highlight paper (1st author), 3 CICC
        1st-author, 2 JSSC 1st-author, 1 TCAS-I 1st-author.
        Total: 6 ISSCC + 6 JSSC contributions.

