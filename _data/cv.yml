# ── Research Summary ───────────────────────────────────────
research_summary:
  - affiliation: "University of Macau, State Key Laboratory of Analog and Mixed-Signal VLSI"
    period: "2018.08–present"
    bullets:
      - >-
        My research focuses on the design of power management chips with
        high current density and fast transient response. To date, I have
        published 25 papers in international conferences and journals,
        including 17 conference papers at ISSCC (1 highlight paper as first
        author), CICC (3 paper as first author), and ISCAS, and 8 journals
        in JSSC (2 as first author), TCAS-I (1 as first author), OJ-SSCS,
        and JOS
      - >-
        I was invited to present at an IEEE PES/PELS event held at UC
        Berkeley, recognized for expertise in PMIC design.

  - affiliation: "University of California, Berkeley, EECS"
    period: "2025.09–present"
    bullets:
      - >-
        My research focuses on the co-design of board-level power
        electronics and on-interposer high-voltage integrated voltage
        regulators (HV IVR, >6V input) for next-generation GPU/CPU
        power delivery, leveraging hybrid switched-capacitor/inductor
        converter topologies and scalable distributed converter arrays.

